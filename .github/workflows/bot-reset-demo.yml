name: "Bot: Reset demo (close PR, delete branch)"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Close any open PRs from the bot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close all open PRs on feature/fix-auth-hashing
          PR_NUM=$(gh pr list --head feature/fix-auth-hashing --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUM" ]; then
            gh pr close "$PR_NUM" --comment "Resetting demo environment."
            echo "Closed PR #$PR_NUM"
          else
            echo "No open PR found."
          fi

      - name: Delete feature branch
        run: |
          git push origin --delete feature/fix-auth-hashing 2>/dev/null || echo "Branch already deleted."
